<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Minecraft Mod Launcher</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="app-window">

    <div class="app-container">
        <aside class="sidebar">
            <div class="nav-group">
                <div class="circle-btn active">🏠</div>
                <div class="circle-btn"></div>
                <div class="circle-btn"></div>
            </div>
            <div class="profile-section">
    <div class="profile-container">
        <div class="profile-avatar" style="background-image: url('https://mc-heads.net/avatar/{{ user }}/100')"></div>
        
        <div class="profile-dropdown">
            <div class="dropdown-header">
                <b>{{ user }}</b>
                <span class="status-online">онлайн</span>
            </div>
            <div class="dropdown-divider"></div>
            <a href="#" onclick="openProfile()" class="dropdown-item">⚙️ Настройки</a>
            <a href="/logout" class="dropdown-item logout">🚪 Выйти</a>
        </div>
    </div>
</div>
        </aside>

        <main class="main-content">
            <div class="top-section">
                <div class="search-wrap">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="search" class="search-field" placeholder="Поиск модификаций...">
                </div>
                <div class="filter-bar">
                    <button class="filter-btn active" data-cat="all">Все</button>
                    <button class="filter-btn" data-cat="tech">Техника</button>
                    <button class="filter-btn" data-cat="magic">Магия</button>
                    <button class="filter-btn" data-cat="nature">Природа</button>
                    <button class="filter-btn" data-cat="installed" style="border: 1px solid var(--accent);">📦 Мои моды</button>
                </div>
            </div>

            <div class="mods-scroll">
                <div id="loader" class="loader-container" style="display: none;">
                    <div class="spinner"></div>
                </div>
                <div class="grid" id="grid"></div>
            </div>
        </main>
    </div>

    <div class="modal-overlay" id="modModal">
        <div class="modal-box">
            <div class="modal-banner" id="m-banner"></div>
            <div class="modal-padding">
                <h2 id="m-name"></h2>
                <div class="stars-row" id="m-stars">
                    <span data-v="1">★</span><span data-v="2">★</span><span data-v="3">★</span><span data-v="4">★</span><span data-v="5">★</span>
                </div>
                <p id="m-desc" style="color: #ccc; line-height: 1.5;"></p>
                <button class="btn-install">УСТАНОВИТЬ</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="profileModal">
        <div class="modal-box" style="width: 350px;">
            <div class="modal-padding">
                <h2 style="margin-bottom: 20px;">Профиль</h2>
                <input type="text" id="userSkinInput" class="input-field" placeholder="Ник скина (Minecraft)">
                <button class="btn-install" onclick="saveProfile()">СОХРАНИТЬ</button>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
