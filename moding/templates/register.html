<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация — Launcher</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .auth-screen { display: flex; justify-content: center; align-items: center; height: 100vh; background: #121212; }
        .auth-box { background: #2b2b2b; padding: 40px; border-radius: 20px; width: 350px; border: 1px solid #444; text-align: center; }
        .auth-box h2 { margin-bottom: 20px; color: #ffaa00; }
        .auth-box a { color: #888; text-decoration: none; font-size: 13px; margin-top: 15px; display: block; }
    </style>
</head>
<body class="auth-screen">
    <div class="auth-box">
        <h2>РЕГИСТРАЦИЯ</h2>
        <form method="POST">
            <input type="text" name="username" class="input-field" placeholder="Логин" required>
            <input type="password" name="password" class="input-field" placeholder="Пароль" required>
            <button type="submit" class="btn-install">СОЗДАТЬ АККАУНТ</button>
        </form>
        <a href="/login">Уже есть аккаунт? Войти</a>
    </div>
</body>
</html>
