<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход в систему</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .auth-container {
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }
        .auth-box {
            background: #2b2b2b; padding: 40px; border-radius: 25px; 
            width: 350px; text-align: center; border: 1px solid #444;
        }
        .auth-box h2 { margin-bottom: 25px; color: var(--accent); }
        .auth-box a { color: #888; text-decoration: none; font-size: 14px; display: block; margin-top: 15px; }
    </style>
</head>
<body class="auth-container">
    <div class="auth-box">
        <h2>ВХОД</h2>
        <form action="/login" method="POST">
            <input type="text" name="username" class="input-field" placeholder="Логин" required>
            <input type="password" name="password" class="input-field" placeholder="Пароль" required>
            <button type="submit" class="btn-install">ВОЙТИ</button>
        </form>
        <a href="/register">Нет аккаунта? Создать</a>
    </div>
</body>
</html>
